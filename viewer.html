<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>AX 가이드</title>
<link rel="stylesheet" href="assets/styles.css">
<link rel="icon" href="assets/img/favicon.png">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="topbar">
  <img src="assets/img/logo.png" alt="kakao!mpact">
  <span class="crumb"><a href="index.html">AX 가이드</a> · <span id="crumb-title">문서</span></span>
  <span class="spacer"></span>
  <span class="tag">Internal</span>
</header>

<main class="doc" id="doc">
  <p>불러오는 중…</p>
</main>

<footer class="foot">
  KAKAO IMPACT · AX · 내부 가이드 · 2026
</footer>

<button class="totop" id="totop" aria-label="맨 위로" title="맨 위로">↑</button>
<script>
// 맨 위로 플로팅 버튼
const totop = document.getElementById('totop');
addEventListener('scroll', () => totop.classList.toggle('show', scrollY > 400), { passive: true });
totop.addEventListener('click', () => scrollTo({ top: 0, behavior: 'smooth' }));
</script>

<script>
// 허용된 문서만 (임의 경로 fetch 방지)
const DOCS = {
  github: { file: 'docs/github.md', title: 'GitHub 사용 가이드' },
};

const params = new URLSearchParams(location.search);
const key = params.get('doc') || 'github';
const meta = DOCS[key];
const el = document.getElementById('doc');

if (!meta) {
  el.innerHTML = '<h1>없는 문서예요</h1><p><a href="index.html">← 가이드 목록으로</a></p>';
} else {
  document.getElementById('crumb-title').textContent = meta.title;
  document.title = meta.title + ' · AX 가이드';
  fetch(meta.file)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(md => render(md))
    .catch(err => {
      el.innerHTML = '<h1>문서를 불러오지 못했어요</h1>'
        + '<p>로컬에서 열었다면 <code>file://</code>가 아니라 로컬 서버(예: <code>python3 -m http.server</code>)로 열어주세요. GitHub Pages에서는 정상 동작합니다.</p>'
        + '<p style="color:#999">(' + err + ')</p>';
    });
}

function slugify(s) {
  return s.trim().toLowerCase()
    .replace(/[^\w가-힣\s-]/g,'').replace(/\s+/g,'-');
}

function render(md) {
  marked.setOptions({ gfm: true, breaks: false });
  el.innerHTML = marked.parse(md);

  // 1) 번호 섹션에 앵커 id 부여 (h2 "1.", h3 "4-3.")
  el.querySelectorAll('h2, h3').forEach(h => {
    const m = h.textContent.match(/^(\d+(?:-\d+)?)\.\s/);
    if (m) h.id = 'sec-' + m[1];
  });

  // 2) 본문의 "→ N번 / N·M번 / N-M번" 참조를 클릭 가능한 앵커로
  el.innerHTML = el.innerHTML.replace(/→\s*(\d[\d·\-]*)번/g, (full, nums) =>
    '→ ' + nums.split('·').map(p => `<a class="xref" href="#sec-${p}">${p}</a>`).join('·') + '번'
  );

  // 3) h2 기준 목차 생성
  const h2s = [...el.querySelectorAll('h2')];
  h2s.forEach((h,i) => { if (!h.id) h.id = 's-' + i; });
  if (h2s.length > 2) {
    const toc = document.createElement('nav');
    toc.className = 'toc';
    toc.innerHTML = '<div class="toc-h">목차</div><ol>' +
      h2s.map(h => `<li><a href="#${h.id}">${h.textContent.replace(/^[0-9]+\.\s*/,'')}</a></li>`).join('') +
      '</ol>';
    h2s[0].parentNode.insertBefore(toc, h2s[0]);
  }

  // 4) GFM 체크리스트 li 스타일 보정
  el.querySelectorAll('li > input[type=checkbox]').forEach(c => {
    c.closest('li').classList.add('task');
  });
}
</script>

</body>
</html>
